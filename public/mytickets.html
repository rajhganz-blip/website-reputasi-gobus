<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiket Saya - GoBus</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- NAVBAR (same as index) -->
  <nav>
    <div class="logo">GoBus</div>
    <div class="nav-links">
      <a href="index.html">Pesan Tiket</a>
      <a href="mytickets.html" class="active">Tiket Saya</a>
      <a href="#promo">Promo</a>
      <a href="#bantuan">Bantuan</a>
    </div>
    <div class="nav-right">
      <a href="#" class="btn-login">Masuk</a>
      <a href="#" class="btn btn-nav">Daftar</a>
    </div>
    <div class="nav-toggle" id="navToggle">☰</div>
  </nav>

  <main class="container" style="margin-top:2rem;">
    <h2>Tiket Saya</h2>
    <div class="table-container" style="margin-top:1rem;">
      <table>
        <thead>
          <tr>
            <th>Kode</th>
            <th>Tanggal Pesan</th>
            <th>Penumpang</th>
            <th>Rute / Tanggal</th>
            <th>Total</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="myTicketsTbody">
          <tr><td colspan="6" style="text-align:center; color:var(--muted);">Memuat data tiket...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    // Reuse toast from index if available
    function toast(msg, type = 'info') {
      const c = document.getElementById('toastContainer');
      if (!c) return;
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
      t.innerHTML = `<span>${icons[type] || 'ℹ️'} ${msg}</span>`;
      c.appendChild(t);
      setTimeout(() => {
        t.style.animation = 'slideOut .3s ease forwards';
        setTimeout(() => t.remove(), 300);
      }, 3500);
    }

    async function loadMyTickets() {
      try {
        const res = await fetch('/api/bookings'); // simple endpoint, adjust as needed
        const data = await res.json();
        if (!data.success) throw new Error(data.message || 'Failed');
        const tbody = document.getElementById('myTicketsTbody');
        if (!data.data || data.data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:var(--muted);">Tidak ada tiket.</td></tr>';
          return;
        }
        tbody.innerHTML = data.data.map(b => `
          <tr>
            <td style="font-family:monospace; font-weight:700;">${b.booking_code}</td>
            <td>${new Date(b.booking_date).toLocaleDateString('id-ID')}</td>
            <td>${b.passenger_name}</td>
            <td>${b.origin} → ${b.destination}<br><span style="font-size:0.8rem;color:var(--muted)">${new Date(b.travel_date).toLocaleDateString('id-ID')}</span></td>
            <td style="font-weight:700; color:var(--primary)">${'Rp' + Number(b.total_price).toLocaleString('id-ID')}</td>
            <td>${b.payment_status}</td>
          </tr>`).join('');
      } catch (err) {
        console.error(err);
        toast(err.message, 'error');
      }
    }

    document.addEventListener('DOMContentLoaded', loadMyTickets);
  </script>

  <script src="script.js"></script>
</body>
</html>
